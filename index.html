                    <div style={{ flex:1,height:1,background:"#ede9e3" }} />
                  </div>
                  {filteredLogs.map(log=>(
                    <div key={log.id} onClick={() => setViewLog({log,action:filteredAction})} style={{ background:"#fff",border:"1.5px solid #ede9e3",borderRadius:14,padding:"14px 16px",marginBottom:10,cursor:"pointer" }}>
                      <p style={{ fontSize:11,color:"#bbb",fontFamily:"DM Sans",fontWeight:600,letterSpacing:0.5,textTransform:"uppercase",marginBottom:8 }}>{dateLabel(log.date)}</p>
                      <p style={{ fontFamily:"DM Sans",fontSize:14,color:"#444",lineHeight:1.6,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical" }}>{log.text}</p>
                      <p style={{ fontSize:11,color:filteredAction.goalColor,fontFamily:"DM Sans",fontWeight:600,marginTop:6 }}>查看全文 →</p>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {mode==="stats" && <div><HeatmapCalendar goals={goals} /><div style={{ height:1,background:"#ede9e3",marginBottom:24 }} /><BarChart goals={goals} /></div>}
          {mode==="weekly" && <WeeklyReport goals={goals} />}
          {mode==="monthly" && <MonthlyReport goals={goals} />}
          {mode==="achievements" && (() => {
            const allUnlocked=[];
            goals.forEach(g=>{ g.branches.forEach(b=>{ b.subgoals.forEach(s=>{ (s.rewards||[]).filter(r=>r.unlockedAt).forEach(r=>{ allUnlocked.push({reward:r,subgoalTitle:s.title,goalTitle:g.title,goalColor:g.color,goalEmoji:g.emoji}); }); }); }); });
            allUnlocked.sort((a,b)=>b.reward.unlockedAt.localeCompare(a.reward.unlockedAt));
            return allUnlocked.length===0 ? (
              <div style={{ textAlign:"center",paddingTop:60,color:"#ccc" }}><p style={{ fontSize:48,marginBottom:12 }}>🏆</p><p style={{ fontFamily:"DM Sans",fontSize:15 }}>還沒有解鎖任何成就</p><p style={{ fontFamily:"DM Sans",fontSize:13,marginTop:6,color:"#ddd",lineHeight:1.6 }}>在小目標裡設定小禮物<br />持續完成行動就會解鎖！</p></div>
            ) : (
              <div>
                <p style={{ fontSize:13,color:"#aaa",fontFamily:"DM Sans",marginBottom:16 }}>已解鎖 {allUnlocked.length} 個成就</p>
                {allUnlocked.map((item,i)=>(
                  <div key={i} style={{ background:"#fff",border:"1.5px solid #e8e4de",borderRadius:20,padding:"16px 18px",marginBottom:12,boxShadow:"0 2px 12px rgba(0,0,0,0.04)",display:"flex",alignItems:"center",gap:14 }}>
                    <div style={{ width:56,height:56,borderRadius:16,background:"#faf9f7",border:"1.5px solid #ede9e3",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:28 }}>{item.reward.emoji||"🎀"}</div>
                    <div style={{ flex:1,minWidth:0 }}>
                      <p style={{ fontFamily:"DM Serif Display, serif",fontSize:16,color:"#1e1c1a",marginBottom:4,lineHeight:1.3 }}>{item.reward.text}</p>
                      <div style={{ display:"flex",alignItems:"center",gap:6,flexWrap:"wrap" }}>
                        <Tag color={item.goalColor} emoji={item.goalEmoji} title={item.goalTitle} />
                        <span style={{ fontSize:11,color:"#bbb",fontFamily:"DM Sans" }}>· {item.subgoalTitle}</span>
                      </div>
                      <p style={{ fontSize:11,color:"#bbb",fontFamily:"DM Sans",marginTop:4 }}>{item.reward.type==="milestone"?`累積 ${item.reward.threshold} 天 · `:"完成目標 · "}解鎖於 {shortDate(item.reward.unlockedAt)}</p>
                    </div>
                    <span style={{ fontSize:20,flexShrink:0 }}>🏆</span>
                  </div>
                ))}
              </div>
            );
          })()}

          {viewLog && (
            <LogDetailModal log={viewLog.log} actionTitle={viewLog.action.title} goalColor={viewLog.action.goalColor} goalEmoji={viewLog.action.goalEmoji} goalTitle={viewLog.action.goalTitle}
              onClose={() => setViewLog(null)}
              onSave={(logId,newText) => { onUpdateLog(viewLog.action,logId,newText); setViewLog(prev=>prev?{...prev,log:{...prev.log,text:newText}}:null); }}
              onDelete={(logId) => { onDeleteLog(viewLog.action,logId); setViewLog(null); }} />
          )}
        </div>
      );
    }

    // ─── App ──────────────────────────────────────────────────────────────────
    function App({ goals, setGoals, user, onSignOut, saveStatus }) {
      const [tab, setTab] = useState("today");
      const [showSearch, setShowSearch] = useState(false);
      const [showDownload, setShowDownload] = useState(false);
      const [searchOpenLog, setSearchOpenLog] = useState(null);
      const [pendingReward, setPendingReward] = useState(null);

      useEffect(() => {
        if (!document.getElementById('gp-fonts')) {
          const link = document.createElement("link");
          link.id = 'gp-fonts';
          link.rel = "stylesheet";
          link.href = "https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap";
          document.head.appendChild(link);
        }
      }, []);

      const updateGoal = (updated) => setGoals(prev => prev.map(g => g.id===updated.id ? updated : g));
      const addGoal = (newGoal) => setGoals(prev => [...prev, newGoal]);
      const deleteGoal = (goalId) => setGoals(prev => prev.filter(g => g.id!==goalId));
      const importGoals = (imported) => setGoals(prev => { const existingIds=new Set(prev.map(g=>g.id)); const newGoals=imported.filter(g=>!existingIds.has(g.id)); return [...prev,...newGoals]; });

      const toggleAction = (action) => {
        setGoals(prev => {
          let oldSub = null;
          prev.forEach(g => g.branches.forEach(b => b.subgoals.forEach(s => { if (s.actions.some(a=>a.id===action.id)) oldSub=s; })));
          const oldDays = oldSub ? getSubgoalActiveDays(oldSub) : 0;
          const next = updateActionInGoals(prev, action.goalId, action.branchId, action.subgoalId, action.id, a => {
            const newDone = !a.done;
            const today = todayKey();
            let logs = a.logs || [];
            if (newDone) {
              const alreadyLogged = logs.some(l=>l.type==="check"&&l.date===today);
              if (!alreadyLogged) logs = [...logs, {id:"chk_"+genId(),date:today,type:"check",text:""}];
            } else {
              logs = logs.filter(l=>!(l.type==="check"&&l.date===today));
            }
            return {...a, done:newDone, logs};
          });
          if (oldSub) {
            let newSub = null;
            next.forEach(g => g.branches.forEach(b => b.subgoals.forEach(s => { if (s.id===oldSub.id) newSub=s; })));
            if (newSub) {
              const newDays = getSubgoalActiveDays(newSub);
              const unlocked = checkNewlyUnlocked(newSub.rewards, oldDays, newDays);
              if (unlocked) {
                setTimeout(() => setPendingReward({reward:unlocked,subgoalTitle:newSub.title,subgoalId:newSub.id}), 300);
                return next.map(g=>({...g,branches:g.branches.map(b=>({...b,subgoals:b.subgoals.map(s=>s.id===newSub.id?{...s,rewards:(s.rewards||[]).map(r=>r.id===unlocked.id?{...r,unlockedAt:todayKey()}:r)}:s)}))}));
              }
            }
          }
          return next;
        });
      };

      const saveLog = (action, log) => setGoals(prev => updateActionInGoals(prev, action.goalId, action.branchId, action.subgoalId, action.id, a => ({...a, logs:[...(a.logs||[]),log]})));
      const updateLog = (action, logId, newText) => setGoals(prev => updateActionInGoals(prev, action.goalId, action.branchId, action.subgoalId, action.id, a => ({...a, logs:a.logs.map(l=>l.id===logId?{...l,text:newText}:l)})));
      const deleteLog = (action, logId) => setGoals(prev => updateActionInGoals(prev, action.goalId, action.branchId, action.subgoalId, action.id, a => ({...a, logs:a.logs.filter(l=>l.id!==logId)})));

      return (
        <div style={{ maxWidth:480,margin:"0 auto",minHeight:"100vh",background:"#faf9f7",position:"relative" }}>
          {/* Save indicator */}
          <SaveIndicator status={saveStatus} />

          {/* Top icons */}
          <div style={{ position:"fixed",top:0,right:"max(0px, calc(50vw - 240px))",zIndex:40,display:"flex",gap:8,padding:"16px 20px" }}>
            <button onClick={() => setShowSearch(true)} style={{ background:"rgba(250,249,247,0.9)",border:"1.5px solid #e8e4de",borderRadius:10,padding:"6px 10px",cursor:"pointer",fontSize:16,backdropFilter:"blur(8px)" }}>🔍</button>
            <button onClick={() => setShowDownload(true)} style={{ background:"rgba(250,249,247,0.9)",border:"1.5px solid #e8e4de",borderRadius:10,padding:"6px 10px",cursor:"pointer",fontSize:16,backdropFilter:"blur(8px)" }}>⬇️</button>
            {onSignOut && <button onClick={onSignOut} title={user?.email||"登出"} style={{ background:"rgba(250,249,247,0.9)",border:"1.5px solid #e8e4de",borderRadius:10,padding:"6px 10px",cursor:"pointer",fontSize:16,backdropFilter:"blur(8px)" }}>👤</button>}
          </div>

          {tab==="today" && <TodayTab goals={goals} onToggleAction={toggleAction} onSaveLog={saveLog} onUpdateLog={updateLog} onDeleteLog={deleteLog} />}
          {tab==="goals" && <GoalsTab goals={goals} onUpdateGoal={updateGoal} onAddGoal={addGoal} onDeleteGoal={deleteGoal} onSaveLog={saveLog} onUpdateLog={updateLog} onDeleteLog={deleteLog} onToggleAction={toggleAction} onTriggerReward={(reward,subgoalTitle) => setPendingReward({reward,subgoalTitle})} />}
          {tab==="records" && <RecordsTab goals={goals} onUpdateLog={updateLog} onDeleteLog={deleteLog} />}

          {pendingReward && <GiftModal reward={pendingReward.reward} subgoalTitle={pendingReward.subgoalTitle} onClose={() => setPendingReward(null)} />}

          <div style={{ position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(250,249,247,0.94)",backdropFilter:"blur(16px)",borderTop:"1px solid #ede9e3",display:"flex",padding:"12px 0 24px" }}>
            {[{key:"today",icon:"✅",label:"待辦"},{key:"goals",icon:"🎯",label:"目標"},{key:"records",icon:"📓",label:"紀錄"}].map(({key,icon,label})=>(
              <button key={key} onClick={() => setTab(key)} style={{ flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:0 }}>
                <span style={{ fontSize:22 }}>{icon}</span>
                <span style={{ fontSize:11,fontFamily:"DM Sans",fontWeight:600,color:tab===key?"#1e1c1a":"#bbb",letterSpacing:0.3 }}>{label}</span>
                {tab===key && <div style={{ width:4,height:4,borderRadius:99,background:"#1e1c1a",marginTop:1 }} />}
              </button>
            ))}
          </div>

          {showSearch && <SearchModal goals={goals} onClose={() => setShowSearch(false)} onOpenLog={(action,log) => {setSearchOpenLog({action,log});setShowSearch(false);}} />}
          {showDownload && <DownloadSheet goals={goals} onClose={() => setShowDownload(false)} onImport={importGoals} />}
          {searchOpenLog && <LogModal action={searchOpenLog.action} onClose={() => setSearchOpenLog(null)} onSaveLog={saveLog} onUpdateLog={updateLog} onDeleteLog={deleteLog} onToggleDone={toggleAction} />}
        </div>
      );
    }

    // ─── Root with Auth ───────────────────────────────────────────────────────
    function Root() {
      const [authState, setAuthState] = useState("loading");
      const [user, setUser] = useState(null);
      const [goals, setGoals] = useState(null);
      const [loginError, setLoginError] = useState("");
      const [saveStatus, setSaveStatus] = useState("idle");
      const saveTimeout = useRef(null);
      const saveStatusTimeout = useRef(null);
      const goalsRef = useRef(goals);
      goalsRef.current = goals;

      useEffect(() => {
        const unsub = auth.onAuthStateChanged(async (u) => {
          if (u) {
            setUser(u);
            setAuthState("loadingData");
            const saved = await loadGoalsFromFirestore(u.uid);
            if (saved !== undefined && saved !== null) {
              // ★ FIX: 只有在成功讀取到資料時才設定
              setGoals(applyDailyReset(saved));
            } else if (saved === null) {
              // 文件不存在（全新用戶），才使用初始資料
              setGoals(INITIAL_GOALS);
              await saveGoalsToFirestore(u.uid, INITIAL_GOALS);
            } else {
              // saved === undefined 代表讀取錯誤，不覆蓋，顯示錯誤
              setGoals([]);
              console.error("Firebase 讀取失敗，請重新整理");
            }
            setAuthState("loggedIn");
          } else {
            setUser(null); setGoals(null); setAuthState("loggedOut");
          }
        });
        return () => unsub();
      }, []);

      // ★ FIX: iOS Safari PWA 切背景時立即儲存
      useEffect(() => {
        const handleVisibilityChange = () => {
          if (document.visibilityState === "hidden" && user && goalsRef.current && authState === "loggedIn") {
            // 立即儲存，不等 debounce
            if (saveTimeout.current) clearTimeout(saveTimeout.current);
            saveGoalsToFirestore(user.uid, goalsRef.current);
          }
        };
        document.addEventListener("visibilitychange", handleVisibilityChange);
        return () => document.removeEventListener("visibilitychange", handleVisibilityChange);
      }, [user, authState]);

      // ★ FIX: debounce 儲存 + 顯示儲存狀態
      useEffect(() => {
        if (!user || !goals || authState !== "loggedIn") return;
        setSaveStatus("saving");
        if (saveTimeout.current) clearTimeout(saveTimeout.current);
        saveTimeout.current = setTimeout(async () => {
          const ok = await saveGoalsToFirestore(user.uid, goals);
          setSaveStatus(ok ? "saved" : "error");
          if (saveStatusTimeout.current) clearTimeout(saveStatusTimeout.current);
          saveStatusTimeout.current = setTimeout(() => setSaveStatus("idle"), 2000);
        }, 800); // ★ 縮短到 0.8 秒
        return () => clearTimeout(saveTimeout.current);
      }, [goals, user, authState]);

      // ★ FIX: 登入回傳是否成功
      const handleLogin = async (password) => {
        setLoginError("");
        try {
          await auth.signInWithEmailAndPassword("judy.860830@hotmail.com", password);
          return true; // 成功
        } catch(e) {
          if (e.code==="auth/wrong-password"||e.code==="auth/invalid-credential") setLoginError("密碼錯誤，請再試一次");
          else if (e.code==="auth/too-many-requests") setLoginError("嘗試次數過多，請稍後再試");
          else setLoginError("登入失敗：" + e.code);
          return false; // 失敗
        }
      };

      const handleSignOut = async () => {
        // 登出前先儲存
        if (user && goals) await saveGoalsToFirestore(user.uid, goals);
        await auth.signOut();
      };

      if (authState==="loading"||authState==="loadingData") return <LoadingScreen message={authState==="loadingData"?"正在載入你的目標...":"載入中..."} />;
      if (authState==="loggedOut") return <LoginScreen onLogin={handleLogin} error={loginError} />;
      return <App goals={goals||[]} setGoals={setGoals} user={user} onSignOut={handleSignOut} saveStatus={saveStatus} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      React.createElement(React.StrictMode, null, React.createElement(Root, null))
    );
  </script>
</body>
</html>
