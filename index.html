    async function loadGoalsFromFirestore(uid) {
      try {
        const snap = await db.collection("users").doc(uid).collection("data").doc("goals").get();
        if (snap.exists) {
          const data = snap.data();
          // ★ FIX: 只要是陣列就接受，即使是空的，避免誤判為「沒資料」
          if (Array.isArray(data.goals)) return data.goals;
        }
      } catch(e) {
        console.error("Load error:", e.code, e.message);
        // ★ FIX: 讀取失敗時回傳 undefined（不是 null），讓呼叫端知道是錯誤
        return undefined;
      }
      return null; // 文件不存在
    }

    async function saveGoalsToFirestore(uid, goals) {

        await db.collection("users").doc(uid).collection("data").doc("goals").set({

        return true;
      } catch(e) {
        console.error("Save error:", e.code, e.message);

    function genId() { return Math.random().toString(36).slice(2, 9); }

    function dateLabel(key) {
      const d = new Date(key + "T00:00:00");
      return d.toLocaleDateString("zh-TW", { year: "numeric", month: "long", day: "numeric", weekday: "long" });
    }
    function shortDate(key) {
      const d = new Date(key + "T00:00:00");
      return d.toLocaleDateString("zh-TW", { month: "long", day: "numeric" });
    }

    function shouldShowToday(freq) {
      if (!freq || freq.type === "daily") return true;
      const today = new Date();
      const dow = today.getDay();
      const todayK = todayKey();
      if (freq.type === "alternate") {
        if (!freq.startDate) return true;
        const start = new Date(freq.startDate + "T00:00:00");
        const diff = Math.round((today - start) / 86400000);
        return diff % 2 === 0;
      }
      if (freq.type === "weekly_specific") return (freq.days || []).includes(dow);
      if (freq.type === "weekly_once") return true;
      if (freq.type === "monthly_once") return true;
      if (freq.type === "specific_dates") return (freq.dates || []).includes(todayK);
      return true;
    }

    function freqLabel(freq) {
      if (!freq || freq.type === "daily") return "每天";
      if (freq.type === "alternate") return "每隔一天";
      if (freq.type === "weekly_specific") {
        const names = ["日","一","二","三","四","五","六"];
        return "週" + (freq.days || []).map(d => names[d]).join("、");
      }
      if (freq.type === "weekly_once") return "每週一次";
      if (freq.type === "monthly_once") return "每月一次";
      if (freq.type === "specific_dates") {
        const ds = freq.dates || [];
        if (ds.length === 0) return "指定日期（未選）";
        if (ds.length <= 3) return ds.map(d => shortDate(d)).join("、");
        return `指定 ${ds.length} 個日期`;
      }
      return "每天";
    }

    function getSubgoalActiveDays(sub) {
      const days = new Set();
      (sub.actions || []).forEach(action => {
        (action.logs || []).forEach(log => {
          if (log.type === "check") days.add(log.date);
        });
      });
      return days.size;
    }

    function checkNewlyUnlocked(rewards, oldDays, newDays) {
      if (!rewards || newDays <= oldDays) return null;
      return (rewards || []).find(r =>
        r.type === "milestone" && r.threshold > oldDays && r.threshold <= newDays && !r.unlockedAt
      ) || null;
    }

    const STORAGE_KEY = "goalplanner_v1";
    const CHECKIN_KEY = "goalplanner_checkin";

    function applyDailyReset(goals) {
      try {
        const last = localStorage.getItem(CHECKIN_KEY);
        const today = todayKey();
        if (last === today) return goals;
        localStorage.setItem(CHECKIN_KEY, today);
        const todayDate = new Date();
        const dow = todayDate.getDay();
        const dayOfMonth = todayDate.getDate();
        return goals.map(g => ({
          ...g,
          branches: g.branches.map(b => ({
            ...b,
            subgoals: b.subgoals.map(s => ({
              ...s,
              actions: s.actions.map(a => {
                const freq = a.freq;
                if (!freq) return { ...a, done: false };
                if (freq.type === "weekly_once") return dow === 1 ? { ...a, done: false } : a;
                if (freq.type === "monthly_once") return dayOfMonth === 1 ? { ...a, done: false } : a;
                return { ...a, done: false };
              })
            }))
          }))
        }));
      } catch (e) { return goals; }
    }

    function updateActionInGoals(goals, goalId, branchId, subgoalId, actionId, updater) {
      return goals.map(g => g.id !== goalId ? g : {
        ...g, branches: g.branches.map(b => b.id !== branchId ? b : {
          ...b, subgoals: b.subgoals.map(s => s.id !== subgoalId ? s : {
            ...s, actions: s.actions.map(a => a.id !== actionId ? a : updater(a))
          })
        })
      });
    }

    function getTodayActions(goals) {
      const actions = [];
      goals.forEach(g => {
        if (g.achieved) return;
        g.branches.forEach(b => {
          if (b.achieved) return;
          b.subgoals.forEach(s => {
            if (s.achieved) return;
            s.actions.forEach(a => {
              if (a.achieved) return;
              if (!shouldShowToday(a.freq)) return;
              actions.push({ ...a, goalTitle: g.title, goalColor: g.color, goalEmoji: g.emoji, goalId: g.id, branchId: b.id, subgoalId: s.id });
            });
          });
        });
      });
      return actions;
    }

          b.subgoals.forEach(s => {

              rows.push([g.title, b.title, s.title, a.title, a.type === "note" ? "紀錄型" : "勾選型", freqLabel(a.freq), a.achieved ? "已達成" : a.done ? "今日完成" : "進行中"]);
            });
          });
        });
      });
      const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
      downloadText("目標行動總表.csv", "\uFEFF" + csv);
    }

    function exportNotes(goals) {
      let txt = "行動紀錄內容\n" + "=".repeat(40) + "\n\n";
      goals.forEach(g => {
        g.branches.forEach(b => {
          b.subgoals.forEach(s => {
            s.actions.forEach(a => {
              if (!a.logs || a.logs.filter(l => l.type !== "check").length === 0) return;
              txt += `【${g.title} > ${b.title} > ${a.title}】\n`;
              a.logs.filter(l => l.type !== "check").forEach(l => { txt += `${dateLabel(l.date)}\n${l.text}\n\n`; });
              txt += "-".repeat(30) + "\n\n";
            });
          });
        });
      });
      downloadText("行動紀錄.txt", txt);
    }

    function exportJSON(goals) {
      downloadText("目標備份.json", JSON.stringify(goals, null, 2));
    }

    function SearchModal({ goals, onClose, onOpenLog }) {
      const [query, setQuery] = useState("");
      const q = query.trim().toLowerCase();
      const results = q.length < 1 ? [] : (() => {
        const hits = [];
        goals.forEach(g => {
          if (g.title.toLowerCase().includes(q)) hits.push({ type: "goal", label: g.title, sub: "", color: g.color, emoji: g.emoji });
          g.branches.forEach(b => {
            if (b.title.toLowerCase().includes(q)) hits.push({ type: "branch", label: b.title, sub: g.title, color: g.color, emoji: g.emoji });
            b.subgoals.forEach(s => {
              s.actions.forEach(a => {
                if (a.title.toLowerCase().includes(q))
                  hits.push({ type: "action", label: a.title, sub: `${g.title} › ${b.title}`, color: g.color, emoji: g.emoji, action: { ...a, goalTitle: g.title, goalColor: g.color, goalEmoji: g.emoji, goalId: g.id, branchId: b.id, subgoalId: s.id } });
                (a.logs || []).forEach(l => {
                  if (l.text && l.text.toLowerCase().includes(q))
                    hits.push({ type: "log", label: l.text.slice(0, 60) + (l.text.length > 60 ? "…" : ""), sub: `${a.title} · ${dateLabel(l.date)}`, color: g.color, emoji: g.emoji, action: { ...a, goalTitle: g.title, goalColor: g.color, goalEmoji: g.emoji, goalId: g.id, branchId: b.id, subgoalId: s.id }, log: l });
                });
              });
            });
          });
        });
        return hits.slice(0, 30);
      })();
      const typeLabel = { goal: "目標", branch: "支線", action: "行動", log: "筆記" };
      const typeColor = { goal: "#8B9CC2", branch: "#7C9E8A", action: "#C2A87C", log: "#C27C8B" };
      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(30,28,26,0.5)", zIndex: 300, backdropFilter: "blur(4px)", display: "flex", flexDirection: "column", alignItems: "center" }} onClick={onClose}>
          <div style={{ background: "#fff", width: "100%", maxWidth: 480, borderRadius: "0 0 24px 24px", boxShadow: "0 8px 40px rgba(0,0,0,0.18)", maxHeight: "85vh", display: "flex", flexDirection: "column" }} onClick={e => e.stopPropagation()}>
            <div style={{ padding: "16px 20px", borderBottom: "1px solid #f0ede8", display: "flex", alignItems: "center", gap: 12 }}>
              <span style={{ fontSize: 18 }}>🔍</span>
              <input value={query} onChange={e => setQuery(e.target.value)} placeholder="搜尋目標、行動、筆記內容..." autoFocus
                style={{ flex: 1, border: "none", outline: "none", fontSize: 16, fontFamily: "DM Sans", color: "#1e1c1a", background: "transparent" }} />
              <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", color: "#bbb", fontSize: 20, padding: 0 }}>✕</button>
            </div>
            <div style={{ overflowY: "auto", flex: 1, padding: "8px 0" }}>
              {q && results.length === 0 && <p style={{ textAlign: "center", color: "#ccc", fontFamily: "DM Sans", fontSize: 14, padding: "40px 0" }}>找不到相關內容</p>}
              {!q && <p style={{ textAlign: "center", color: "#ccc", fontFamily: "DM Sans", fontSize: 14, padding: "40px 0" }}>輸入關鍵字開始搜尋</p>}
              {results.map((r, i) => (
                <div key={i} onClick={() => { if (r.action) onOpenLog(r.action, r.log || null); onClose(); }}
                  style={{ padding: "12px 20px", borderBottom: "1px solid #f8f5f0", cursor: r.action ? "pointer" : "default", display: "flex", alignItems: "flex-start", gap: 12 }}>
                  <span style={{ fontSize: 18, flexShrink: 0 }}>{r.emoji}</span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2 }}>
                      <span style={{ fontSize: 10, fontWeight: 700, color: typeColor[r.type], fontFamily: "DM Sans", letterSpacing: 0.5 }}>{typeLabel[r.type]}</span>
                    </div>
                    <p style={{ fontFamily: "DM Sans", fontSize: 14, color: "#1e1c1a", fontWeight: 500, marginBottom: 2 }}>{r.label}</p>
                    {r.sub && <p style={{ fontFamily: "DM Sans", fontSize: 12, color: "#aaa" }}>{r.sub}</p>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function DownloadSheet({ goals, onClose, onImport }) {
      const fileRef = useRef(null);
      const handleImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const imported = JSON.parse(ev.target.result);
            if (!Array.isArray(imported)) throw new Error("格式錯誤");
            onImport(imported); onClose();
          } catch { alert("檔案格式不正確，請選擇由本 App 匯出的 JSON 備份檔。"); }
        };
        reader.readAsText(file);
        e.target.value = "";
      };
      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(30,28,26,0.45)", zIndex: 300, display: "flex", alignItems: "flex-end", justifyContent: "center", backdropFilter: "blur(4px)" }} onClick={onClose}>
          <div style={{ background: "#fff", borderRadius: "24px 24px 0 0", padding: "0 0 48px", width: "100%", maxWidth: 480, boxShadow: "0 -8px 40px rgba(0,0,0,0.12)" }} onClick={e => e.stopPropagation()}>
            <div style={{ padding: "20px 24px 0" }}>
              <div style={{ width: 36, height: 4, background: "#e0ddd8", borderRadius: 99, margin: "0 auto 20px" }} />
              <h3 style={{ fontFamily: "DM Serif Display, serif", fontSize: 20, color: "#1e1c1a", fontWeight: 400, marginBottom: 6 }}>資料管理</h3>
              <p style={{ fontSize: 13, color: "#aaa", fontFamily: "DM Sans", marginBottom: 24 }}>匯出或匯入資料</p>
              <p style={{ fontSize: 11, color: "#aaa", fontFamily: "DM Sans", fontWeight: 600, letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 10 }}>匯出</p>
              {[
                { icon: "📊", title: "目標與行動總表", desc: "包含所有目標、支線、行動與狀態", ext: "CSV", fn: () => exportCSV(goals) },
                { icon: "📝", title: "行動紀錄內容", desc: "所有筆記型行動的文字紀錄", ext: "TXT", fn: () => exportNotes(goals) },
                { icon: "💾", title: "全部資料備份", desc: "完整資料，可用於還原或轉移", ext: "JSON", fn: () => exportJSON(goals) },
              ].map(({ icon, title, desc, ext, fn }) => (
                <div key={ext} onClick={() => { fn(); onClose(); }} style={{ display: "flex", alignItems: "center", gap: 16, padding: "16px 18px", background: "#faf9f7", borderRadius: 16, border: "1.5px solid #ede9e3", marginBottom: 10, cursor: "pointer" }}>
                  <span style={{ fontSize: 28, flexShrink: 0 }}>{icon}</span>
                  <div style={{ flex: 1 }}>
                    <p style={{ fontFamily: "DM Sans", fontSize: 15, fontWeight: 600, color: "#1e1c1a", marginBottom: 2 }}>{title}</p>
                    <p style={{ fontFamily: "DM Sans", fontSize: 12, color: "#aaa" }}>{desc}</p>
                  </div>
                  <span style={{ fontSize: 11, fontWeight: 700, color: "#fff", background: "#1e1c1a", borderRadius: 6, padding: "3px 8px", fontFamily: "DM Sans" }}>{ext}</span>
                </div>
              ))}
              <p style={{ fontSize: 11, color: "#aaa", fontFamily: "DM Sans", fontWeight: 600, letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 10, marginTop: 20 }}>匯入</p>
              <div onClick={() => fileRef.current?.click()} style={{ display: "flex", alignItems: "center", gap: 16, padding: "16px 18px", background: "#faf9f7", borderRadius: 16, border: "1.5px solid #ede9e3", cursor: "pointer" }}>
                <span style={{ fontSize: 28, flexShrink: 0 }}>📂</span>
                <div style={{ flex: 1 }}>
                  <p style={{ fontFamily: "DM Sans", fontSize: 15, fontWeight: 600, color: "#1e1c1a", marginBottom: 2 }}>從備份還原</p>
                  <p style={{ fontFamily: "DM Sans", fontSize: 12, color: "#aaa" }}>選擇 JSON 備份檔，與現有資料合併</p>
                </div>
                <span style={{ fontSize: 11, fontWeight: 700, color: "#fff", background: "#7C9E8A", borderRadius: 6, padding: "3px 8px", fontFamily: "DM Sans" }}>JSON</span>
              </div>
              <input ref={fileRef} type="file" accept=".json,.txt" onChange={handleImport} style={{ display: "none" }} />
            </div>
          </div>
        </div>
      );
    }

    function InlineCalendar({ selectedDates, onChange }) {
      const today = new Date();
      const [viewYear, setViewYear] = useState(today.getFullYear());
      const [viewMonth, setViewMonth] = useState(today.getMonth());
      const monthNames = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
      const dowNames = ["日","一","二","三","四","五","六"];
      const prevMonth = () => viewMonth === 0 ? (setViewMonth(11), setViewYear(y => y-1)) : setViewMonth(m => m-1);
      const nextMonth = () => viewMonth === 11 ? (setViewMonth(0), setViewYear(y => y+1)) : setViewMonth(m => m+1);
      const toggleDate = (ds) => onChange(selectedDates.includes(ds) ? selectedDates.filter(d => d !== ds) : [...selectedDates, ds].sort());
      const firstDay = new Date(viewYear, viewMonth, 1).getDay();
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      const cells = [];
      for (let i = 0; i < firstDay; i++) cells.push(null);
      for (let d = 1; d <= daysInMonth; d++) cells.push(d);
      return (
        <div style={{ background: "#f8f6f2", borderRadius: 12, padding: "10px 12px", marginTop: 8 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
            <button onClick={prevMonth} style={{ background: "none", border: "none", cursor: "pointer", color: "#888", fontSize: 16, padding: "0 4px" }}>‹</button>
            <span style={{ fontFamily: "DM Sans", fontWeight: 600, color: "#1e1c1a", fontSize: 13 }}>{viewYear}年 {monthNames[viewMonth]}</span>
            <button onClick={nextMonth} style={{ background: "none", border: "none", cursor: "pointer", color: "#888", fontSize: 16, padding: "0 4px" }}>›</button>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 2, marginBottom: 2 }}>
            {dowNames.map(d => <div key={d} style={{ textAlign: "center", fontSize: 10, color: "#bbb", fontFamily: "DM Sans", fontWeight: 600 }}>{d}</div>)}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 2 }}>
            {cells.map((day, i) => {
              if (!day) return <div key={"e"+i} />;
              const ds = `${viewYear}-${String(viewMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
              const sel = selectedDates.includes(ds);
              const isTod = ds === todayKey();
              return (
                <div key={ds} onClick={() => toggleDate(ds)} style={{
                  aspectRatio: "1", display: "flex", alignItems: "center", justifyContent: "center",
                  borderRadius: 6, cursor: "pointer", fontSize: 12, fontFamily: "DM Sans",
                  fontWeight: sel ? 700 : 400,
                  background: sel ? "#1e1c1a" : "transparent",
                  color: sel ? "#fff" : isTod ? "#1e1c1a" : "#555",
                  border: isTod && !sel ? "1.5px solid #c8c4be" : "1.5px solid transparent",
                }}>{day}</div>
              );
            })}
          </div>
          {selectedDates.length > 0 && (
            <div style={{ marginTop: 8, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <p style={{ fontSize: 11, color: "#7C9E8A", fontFamily: "DM Sans", fontWeight: 600 }}>已選 {selectedDates.length} 天</p>
              <button onClick={() => onChange([])} style={{ fontSize: 11, color: "#bbb", fontFamily: "DM Sans", background: "none", border: "none", cursor: "pointer", padding: 0 }}>清除</button>
            </div>
          )}
        </div>
      );
    }

    function FreqPicker({ freq, onChange }) {
      const t = freq?.type || "daily";
      const DOW = ["日","一","二","三","四","五","六"];
      return (
        <div style={{ marginBottom: 12 }}>
          <p style={{ fontSize: 11, color: "#aaa", fontFamily: "DM Sans", fontWeight: 600, letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 8 }}>頻率</p>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 8 }}>
            {[["daily","每天"],["alternate","隔天"],["weekly_specific","每週特定"],["weekly_once","每週一次"],["monthly_once","每月一次"],["specific_dates","指定日期"]].map(([k, v]) => (
              <button key={k} onClick={() => {
                if (k === "specific_dates") onChange({ type: k, dates: freq?.type === "specific_dates" ? (freq?.dates || []) : [], startDate: todayKey() });
                else onChange({ type: k, startDate: todayKey(), days: t === "weekly_specific" && k === "weekly_specific" ? (freq?.days || []) : [] });
              }} style={{
                padding: "6px 12px", borderRadius: 99, border: "1.5px solid",
                borderColor: t === k ? "#1e1c1a" : "#e8e4de",
                background: t === k ? "#1e1c1a" : "#fff",
                color: t === k ? "#fff" : "#888",
                fontSize: 12, fontFamily: "DM Sans", cursor: "pointer"
              }}>{v}</button>
            ))}
          </div>
          {t === "weekly_specific" && (
            <div style={{ display: "flex", gap: 6 }}>
              {DOW.map((d, i) => {
                const selected = (freq?.days || []).includes(i);
                return (
                  <button key={i} onClick={() => {
                    const days = selected ? (freq.days || []).filter(x => x !== i) : [...(freq.days || []), i];
                    onChange({ ...freq, days });
                  }} style={{
                    width: 34, height: 34, borderRadius: 99, border: "1.5px solid",
                    borderColor: selected ? "#1e1c1a" : "#e8e4de",
                    background: selected ? "#1e1c1a" : "#fff",

                    fontSize: 12, fontFamily: "DM Sans", fontWeight: 600, cursor: "pointer"

              })}
            </div>
          )}
          {t === "specific_dates" && (
            <InlineCalendar selectedDates={freq?.dates || []} onChange={(dates) => onChange({ ...freq, dates })} />
          )}
        </div>
      );
    }

                  <button onClick={() => { onToggleDone(action); onClose(); }} style={{ marginLeft: 12, padding: "6px 14px", borderRadius: 99, border: "1.5px solid", borderColor: action.done ? "#c8c4be" : "#7C9E8A", background: action.done ? "#f0ede8" : "#7C9E8A22", color: action.done ? "#999" : "#5a8a6a", fontSize: 12, fontFamily: "DM Sans", fontWeight: 600, cursor: "pointer", flexShrink: 0 }}>{action.done ? "取消完成" : "標記完成"}</button>

                </div>

                <div key={log.id} onClick={() => setViewLog(log)} style={{ background: "#faf9f7", borderRadius: 14, padding: "12px 16px", marginBottom: 10, cursor: "pointer", border: "1.5px solid #ede9e3" }}>
                  <p style={{ fontSize: 11, color: "#bbb", fontFamily: "DM Sans", fontWeight: 600, letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 6 }}>{dateLabel(log.date)}</p>
                  <p style={{ fontFamily: "DM Sans", fontSize: 14, color: "#444", lineHeight: 1.6, overflow: "hidden", display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical" }}>{log.text}</p>

                  <textarea value={newNote} onChange={e => setNewNote(e.target.value)} placeholder={isNote ? "今天的思考與整理..." : "備註..."} autoFocus
                    style={{ width: "100%", minHeight: 140, border: "1.5px solid #1e1c1a", borderRadius: 14, padding: "12px 14px", fontSize: 14, fontFamily: "DM Sans", resize: "none", outline: "none", color: "#1e1c1a", background: "#faf9f7", boxSizing: "border-box", lineHeight: 1.7 }} />
                  <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                    <button onClick={() => { setShowAdd(false); setNewNote(""); }} style={{ flex: 1, padding: "11px", borderRadius: 12, border: "1.5px solid #e8e4de", background: "#fff", color: "#888", fontSize: 14, fontFamily: "DM Sans", cursor: "pointer" }}>取消</button>

    function TodayTab({ goals, onToggleAction, onSaveLog, onUpdateLog, onDeleteLog }) {
      const [logAction, setLogAction] = useState(null);
      const actions = getTodayActions(goals);
      const done = actions.filter(a => a.done).length;
      const total = actions.length;
      const pct = total ? Math.round((done / total) * 100) : 0;
      const getRefreshed = (a) => {
        if (!a) return null;
        return getAllActionsFlat(goals).find(x => x.id === a.id) || a;
      };
      return (
        <div style={{ padding: "0 20px 100px" }}>
          <div style={{ paddingTop: 60, paddingBottom: 24 }}>
            <p style={{ fontSize: 13, color: "#aaa", fontFamily: "DM Sans", fontWeight: 500, marginBottom: 4 }}>{todayStr()}</p>

              <div style={{ flex: 1 }}><ProgressBar value={pct} color="#1e1c1a" /></div>

              <p style={{ fontSize: 40, marginBottom: 12 }}>🎉</p>

          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {actions.map(action => (
              <div key={action.id} style={{ background: action.done ? "#f5f3f0" : "#fff", border: "1.5px solid", borderColor: action.done ? "#e8e4de" : "#ede9e3", borderRadius: 18, padding: "14px 16px", display: "flex", alignItems: "flex-start", gap: 12, boxShadow: action.done ? "none" : "0 2px 12px rgba(0,0,0,0.04)", transition: "all 0.25s" }}>
                <div onClick={() => onToggleAction(action)} style={{ width: 24, height: 24, borderRadius: 8, border: "2px solid", borderColor: action.done ? action.goalColor : "#d0ccc6", background: action.done ? action.goalColor : "transparent", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", flexShrink: 0, marginTop: 2, transition: "all 0.2s" }}>
                  {action.done && <span style={{ color: "#fff", fontSize: 13 }}>✓</span>}
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <p style={{ fontFamily: "DM Sans", fontSize: 15, fontWeight: 500, color: action.done ? "#aaa" : "#1e1c1a", textDecoration: action.done ? "line-through" : "none", marginBottom: 6, lineHeight: 1.4 }}>
                    {action.title}{action.type === "note" && <span style={{ marginLeft: 5, fontSize: 12, color: "#bbb" }}>📝</span>}
                  </p>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                    <Tag color={action.goalColor} emoji={action.goalEmoji} title={action.goalTitle} />
                    <span style={{ fontSize: 11, color: "#ccc", fontFamily: "DM Sans" }}>{freqLabel(action.freq)}</span>
                    {action.logs.filter(l => l.type !== "check").length > 0 && <span style={{ fontSize: 11, color: "#bbb", fontFamily: "DM Sans" }}>{action.logs.filter(l => l.type !== "check").length} 筆紀錄</span>}
                  </div>
                </div>
                <button onClick={() => setLogAction(action)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 17, opacity: 0.35, padding: 0, flexShrink: 0, marginTop: 2 }}>✏️</button>
              </div>
            ))}
          </div>
          {logAction && (
            <LogModal action={getRefreshed(logAction)} onClose={() => setLogAction(null)} onSaveLog={onSaveLog} onUpdateLog={onUpdateLog} onDeleteLog={onDeleteLog} onToggleDone={onToggleAction} />
          )}
        </div>
      );
    }

    function InlineAdd({ placeholder, onAdd, color, small, showType, showNote }) {
      const [active, setActive] = useState(false);
      const [val, setVal] = useState("");
      const [note, setNote] = useState("");
      const [type, setType] = useState(null);
      const [freq, setFreq] = useState(null);
      const reset = () => { setVal(""); setNote(""); setType(null); setFreq(null); setActive(false); };
      const canSubmit = showType ? val.trim() && type !== null && freq !== null : val.trim();
      const submit = () => {
        if (!canSubmit) return;
        if (showType) onAdd(val.trim(), type, freq);
        else if (showNote) onAdd(val.trim(), note.trim());
        else onAdd(val.trim());
        reset();
      };
      if (!active) return (
        <button onClick={() => setActive(true)} style={{ padding: small ? "8px 12px" : "10px 14px", borderRadius: 12, border: "1px dashed #d0ccc6", background: "transparent", color: "#bbb", fontSize: small ? 13 : 14, fontFamily: "DM Sans", cursor: "pointer", width: "100%" }}>+ {placeholder}</button>
      );
      return (
        <div style={{ background: "#faf9f7", borderRadius: 14, padding: 14, marginBottom: 4, border: "1.5px solid #ede9e3" }}>
          <input value={val} onChange={e => setVal(e.target.value)} placeholder={placeholder} autoFocus
            onKeyDown={e => e.key === "Enter" && canSubmit && submit()}
            style={{ width: "100%", border: "none", borderBottom: "1px solid #e8e4de", fontSize: 14, fontFamily: "DM Sans", outline: "none", background: "transparent", paddingBottom: 8, marginBottom: 10, boxSizing: "border-box" }} />
          {showNote && (
            <textarea value={note} onChange={e => setNote(e.target.value)} placeholder="說明（選填）..."
              style={{ width: "100%", border: "none", borderBottom: "1px solid #e8e4de", fontSize: 12, fontFamily: "DM Sans", outline: "none", paddingBottom: 6, marginBottom: 10, boxSizing: "border-box", resize: "none", minHeight: 44, background: "transparent", color: "#666", lineHeight: 1.6 }} />
          )}
          {showType && (
            <>
              <div style={{ marginBottom: 12 }}>
                <p style={{ fontSize: 11, color: "#aaa", fontFamily: "DM Sans", fontWeight: 600, letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 8 }}>類型 {type === null && <span style={{ color: "#e05555" }}>*</span>}</p>
                <div style={{ display: "flex", gap: 6 }}>
                  {[["check","✅ 勾選型"],["note","📝 紀錄型"]].map(([k,v]) => (
                    <button key={k} onClick={() => setType(k)} style={{ flex: 1, padding: "7px", borderRadius: 8, border: "1.5px solid", borderColor: type === k ? "#1e1c1a" : "#e8e4de", background: type === k ? "#1e1c1a" : "#fff", color: type === k ? "#fff" : "#888", fontSize: 12, fontFamily: "DM Sans", cursor: "pointer" }}>{v}</button>
                  ))}
                </div>
              </div>
              <div style={{ marginBottom: 12 }}>
                <p style={{ fontSize: 11, color: "#aaa", fontFamily: "DM Sans", fontWeight: 600, letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 8 }}>頻率 {freq === null && <span style={{ color: "#e05555" }}>*</span>}</p>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 6 }}>
                  {[["daily","每天"],["alternate","隔天"],["weekly_specific","每週特定"],["weekly_once","每週一次"],["monthly_once","每月一次"],["specific_dates","指定日期"]].map(([k,v]) => (
                    <button key={k} onClick={() => {
                      if (k === "specific_dates") setFreq({ type: k, dates: [], startDate: todayKey() });
                      else setFreq({ type: k, startDate: todayKey(), days: [] });
                    }} style={{ padding: "6px 12px", borderRadius: 99, border: "1.5px solid", borderColor: freq?.type === k ? "#1e1c1a" : "#e8e4de", background: freq?.type === k ? "#1e1c1a" : "#fff", color: freq?.type === k ? "#fff" : "#888", fontSize: 12, fontFamily: "DM Sans", cursor: "pointer" }}>{v}</button>
                  ))}
                </div>
                {freq?.type === "weekly_specific" && (
                  <div style={{ display: "flex", gap: 6, marginTop: 6 }}>
                    {["日","一","二","三","四","五","六"].map((d,i) => {
                      const sel = (freq.days||[]).includes(i);
                      return <button key={i} onClick={() => { const days = sel ? freq.days.filter(x=>x!==i) : [...(freq.days||[]),i]; setFreq({...freq,days}); }} style={{ width:34,height:34,borderRadius:99,border:"1.5px solid",borderColor:sel?"#1e1c1a":"#e8e4de",background:sel?"#1e1c1a":"#fff",color:sel?"#fff":"#aaa",fontSize:12,fontFamily:"DM Sans",fontWeight:600,cursor:"pointer" }}>{d}</button>;
                    })}
                  </div>
                )}
                {freq?.type === "specific_dates" && <InlineCalendar selectedDates={freq.dates||[]} onChange={(dates) => setFreq({...freq,dates})} />}
              </div>
            </>
          )}
          <div style={{ display: "flex", gap: 6 }}>
            <button onClick={submit} disabled={!canSubmit} style={{ flex: 1, padding: "9px", borderRadius: 10, border: "none", background: canSubmit ? (color||"#1e1c1a") : "#e8e4de", color: canSubmit ? "#fff" : "#bbb", fontSize: 13, fontFamily: "DM Sans", fontWeight: 600, cursor: canSubmit ? "pointer" : "default" }}>新增</button>
            <button onClick={reset} style={{ padding: "9px 14px", borderRadius: 10, border: "1px solid #e8e4de", background: "#fff", color: "#aaa", cursor: "pointer" }}>✕</button>
          </div>
        </div>
      );
    }

        <div style={{ position: "fixed", inset: 0, background: "rgba(20,16,12,0.75)", zIndex: 400, display: "flex", alignItems: "center", justifyContent: "center", backdropFilter: "blur(6px)", padding: 24 }} onClick={opened ? onClose : undefined}>
          <div style={{ background: "#fff", borderRadius: 28, padding: "36px 28px 32px", width: "100%", maxWidth: 340, textAlign: "center", boxShadow: "0 24px 80px rgba(0,0,0,0.3)" }}>
            <style>{`@keyframes popIn{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}@keyframes shake{0%,100%{transform:rotate(0)}20%{transform:rotate(-8deg)}40%{transform:rotate(8deg)}60%{transform:rotate(-5deg)}80%{transform:rotate(5deg)}}@keyframes floatUp{from{opacity:0;transform:translateY(10px) scale(0.8)}to{opacity:1;transform:translateY(0) scale(1)}}@keyframes confetti{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(-60px) rotate(360deg)}}`}</style>

                  <p style={{ fontSize: 13, color: "#bbb", fontFamily: "DM Sans", marginTop: 10 }}>點擊打開禮物</p>
                </div>
              </>
            ) : (
              <>
                <div style={{ position: "relative", height: 20, marginBottom: 8, overflow: "hidden" }}>
                  {["#FFD700","#FF6B6B","#7C9E8A","#8B9CC2","#C2A87C"].map((c,i) => (
                    <div key={i} style={{ position: "absolute", left: `${15+i*17}%`, width: 8, height: 8, borderRadius: "50%", background: c, animation: `confetti 0.8s ${i*0.1}s ease-out forwards` }} />
                  ))}
                </div>
                <div style={{ animation: "floatUp 0.4s ease" }}>
                  <p style={{ fontSize: 13, color: "#aaa", fontFamily: "DM Sans", marginBottom: 4 }}>{subgoalTitle}</p>
                  <p style={{ fontFamily: "DM Serif Display, serif", fontSize: 18, color: "#1e1c1a", marginBottom: 20 }}>{reward.type === "milestone" ? `堅持了 ${reward.threshold} 天！` : "恭喜達成目標！"}</p>
                  <div style={{ background: "#faf9f7", borderRadius: 20, padding: "20px 16px", marginBottom: 24, border: "1.5px solid #ede9e3" }}>
                    <p style={{ fontSize: 48, marginBottom: 10 }}>{reward.emoji||"🎀"}</p>
                    <p style={{ fontFamily: "DM Serif Display, serif", fontSize: 18, color: "#1e1c1a", lineHeight: 1.5 }}>{reward.text}</p>
                  </div>
                </div>
                <button onClick={onClose} style={{ width: "100%", padding: "13px", borderRadius: 14, border: "none", background: "#1e1c1a", color: "#fff", fontSize: 15, fontFamily: "DM Sans", fontWeight: 600, cursor: "pointer" }}>太棒了！</button>
              </>
            )}
          </div>
        </div>
      );
    }

    function RewardSection({ rewards, rewardCount, unlockedCount, onSave }) {
      const [expanded, setExpanded] = useState(false);
      return (
        <div style={{ marginTop: 8, background: "#fff", borderRadius: 12, border: "1px solid #ede9e3", overflow: "hidden" }}>
          <div onClick={() => setExpanded(e => !e)} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 14px", cursor: "pointer" }}>

    const REWARD_EMOJIS = ["🎀","🍰","🎬","👗","✈️","💆","🛍️","🍜","📚","🎮","💅","🌸","🥂","🎵","⭐","🏖️"];

    function RewardEditor({ rewards, onSave }) {
      const [list, setList] = useState(rewards || []);
      const [adding, setAdding] = useState(false);
      const [editIdx, setEditIdx] = useState(null);
      const [form, setForm] = useState({ type: "milestone", threshold: 30, text: "", emoji: "🎀" });
      const openAdd = () => { setForm({ type: "milestone", threshold: 30, text: "", emoji: "🎀" }); setEditIdx(null); setAdding(true); };
      const openEdit = (i) => { setForm({ ...list[i] }); setEditIdx(i); setAdding(true); };
      const save = () => {
        if (!form.text.trim()) return;
        const newList = editIdx !== null ? list.map((r,i) => i===editIdx ? {...form,id:r.id} : r) : [...list,{...form,id:genId(),unlockedAt:null}];
        setList(newList); onSave(newList); setAdding(false);
      };
      const remove = (i) => { const newList = list.filter((_,idx)=>idx!==i); setList(newList); onSave(newList); };
      return (
        <div style={{ marginTop: 12 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
            <p style={{ fontSize: 11, color: "#aaa", fontFamily: "DM Sans", fontWeight: 600, letterSpacing: 0.5, textTransform: "uppercase" }}>🎁 小禮物設定</p>
            {!adding && <button onClick={openAdd} style={{ fontSize: 12, color: "#888", fontFamily: "DM Sans", background: "none", border: "1.5px solid #e8e4de", borderRadius: 8, padding: "4px 10px", cursor: "pointer" }}>＋ 新增</button>}
          </div>
          {list.length === 0 && !adding && <p style={{ fontSize: 12, color: "#ccc", fontFamily: "DM Sans", textAlign: "center", padding: "10px 0" }}>還沒有設定小禮物</p>}
          {list.map((r,i) => (
            <div key={r.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", background: r.unlockedAt ? "#f5fbf7" : "#faf9f7", border: `1.5px solid ${r.unlockedAt ? "#a8d8b8" : "#ede9e3"}`, borderRadius: 12, marginBottom: 6 }}>
              <span style={{ fontSize: 22, flexShrink: 0 }}>{r.emoji||"🎀"}</span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <p style={{ fontSize: 12, fontFamily: "DM Sans", color: "#555", fontWeight: 500 }}>{r.text}</p>

                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {[7,14,21,30,60,100].map(n => (
                      <button key={n} onClick={() => setForm(f=>({...f,threshold:n}))} style={{ padding:"5px 12px",borderRadius:99,border:"1.5px solid",borderColor:form.threshold===n?"#1e1c1a":"#e8e4de",background:form.threshold===n?"#1e1c1a":"#fff",color:form.threshold===n?"#fff":"#888",fontSize:12,fontFamily:"DM Sans",cursor:"pointer" }}>{n} 天</button>
                    ))}
                    <input type="number" value={form.threshold} onChange={e => setForm(f=>({...f,threshold:parseInt(e.target.value)||1}))} style={{ width:60,border:"1.5px solid #e8e4de",borderRadius:8,padding:"5px 8px",fontSize:12,fontFamily:"DM Sans",outline:"none",textAlign:"center" }} />
                  </div>
                </div>
              )}
              <div style={{ marginBottom: 12 }}>
                <p style={{ fontSize: 11, color: "#aaa", fontFamily: "DM Sans", fontWeight: 600, letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 6 }}>圖示</p>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                  {REWARD_EMOJIS.map(e => <div key={e} onClick={() => setForm(f=>({...f,emoji:e}))} style={{ width:36,height:36,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,cursor:"pointer",background:form.emoji===e?"#f0ede8":"transparent",border:form.emoji===e?"2px solid #1e1c1a":"2px solid transparent" }}>{e}</div>)}
                </div>
              </div>
              <div style={{ marginBottom: 12 }}>
                <p style={{ fontSize: 11, color: "#aaa", fontFamily: "DM Sans", fontWeight: 600, letterSpacing: 0.5, textTransform: "uppercase", marginBottom: 6 }}>獎勵內容</p>
                <input value={form.text} onChange={e => setForm(f=>({...f,text:e.target.value}))} placeholder="例如：買一件新衣服" autoFocus
                  style={{ width:"100%",border:"1.5px solid #e8e4de",borderRadius:10,padding:"9px 12px",fontSize:14,fontFamily:"DM Sans",outline:"none",background:"#fff",boxSizing:"border-box" }} />

              <div style={{ display: "flex", gap: 8 }}>

    function SubgoalCard({ sub, goalColor, goalId, branchId, expanded, onToggle, onAddAction, onDeleteAction, onDeleteSubgoal, onAchieveAction, onAchieveSubgoal, onSaveLog, onUpdateLog, onDeleteLog, onToggleDone, onUpdateSubgoal }) {
      const [logAction, setLogAction] = useState(null);
      const [editingActionId, setEditingActionId] = useState(null);
      const [editActionTitle, setEditActionTitle] = useState("");
      const [editActionFreq, setEditActionFreq] = useState(null);
      const [editingSubgoalTitle, setEditingSubgoalTitle] = useState(false);
      const [subgoalTitleVal, setSubgoalTitleVal] = useState(sub.title);
      const [editingSubgoalNote, setEditingSubgoalNote] = useState(false);
      const [subgoalNoteVal, setSubgoalNoteVal] = useState(sub.note || "");
      const activeActions = sub.actions.filter(a => !a.achieved);
      const done = activeActions.filter(a => a.done).length;
      const activeDays = getSubgoalActiveDays(sub);
      const startEditAction = (action, e) => { e.stopPropagation(); setEditingActionId(action.id); setEditActionTitle(action.title); setEditActionFreq(action.freq || { type: "daily", startDate: todayKey(), days: [] }); };
      const saveEditAction = (action) => { if (!editActionTitle.trim()) return; onUpdateSubgoal({ ...sub, actions: sub.actions.map(a => a.id === action.id ? { ...a, title: editActionTitle.trim(), freq: editActionFreq } : a) }); setEditingActionId(null); };
      const saveSubgoalTitle = () => { if (!subgoalTitleVal.trim()) { setEditingSubgoalTitle(false); return; } onUpdateSubgoal({ ...sub, title: subgoalTitleVal.trim(), note: subgoalNoteVal.trim() }); setEditingSubgoalTitle(false); };
      const saveSubgoalNote = () => { onUpdateSubgoal({ ...sub, note: subgoalNoteVal.trim() }); setEditingSubgoalNote(false); };
      return (
        <div style={{ marginBottom: 8, opacity: sub.achieved ? 0.55 : 1 }}>
          <div style={{ background: "#fff", border: "1.5px solid #ede9e3", borderRadius: 14, padding: "12px 14px" }}>
            {editingSubgoalTitle ? (
              <div>
                <input value={subgoalTitleVal} onChange={e => setSubgoalTitleVal(e.target.value)} autoFocus onKeyDown={e => { if (e.key === "Escape") { setSubgoalTitleVal(sub.title); setSubgoalNoteVal(sub.note||""); setEditingSubgoalTitle(false); } }}
                  style={{ width:"100%",border:"none",borderBottom:"1.5px solid #1e1c1a",fontSize:14,fontFamily:"DM Sans",fontWeight:500,outline:"none",background:"transparent",paddingBottom:4,marginBottom:8,boxSizing:"border-box" }} />
                <textarea value={subgoalNoteVal} onChange={e => setSubgoalNoteVal(e.target.value)} placeholder="說明（選填）…"
                  style={{ width:"100%",border:"none",borderBottom:"1px solid #e8e4de",fontSize:12,fontFamily:"DM Sans",outline:"none",paddingBottom:6,marginBottom:8,boxSizing:"border-box",resize:"none",minHeight:44,background:"transparent",color:"#666",lineHeight:1.6 }} />
                <div style={{ display:"flex",gap:6 }}>
                  <button onClick={() => { setSubgoalTitleVal(sub.title); setSubgoalNoteVal(sub.note||""); setEditingSubgoalTitle(false); }} style={{ flex:1,padding:"6px",borderRadius:8,border:"1.5px solid #e8e4de",background:"#fff",color:"#888",fontSize:12,fontFamily:"DM Sans",cursor:"pointer" }}>取消</button>
                  <button onClick={saveSubgoalTitle} style={{ flex:2,padding:"6px",borderRadius:8,border:"none",background:"#1e1c1a",color:"#fff",fontSize:12,fontFamily:"DM Sans",fontWeight:600,cursor:"pointer" }}>儲存</button>
                </div>
              </div>
            ) : (
              <>
                <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:sub.achieved?0:6 }}>
                  <p onClick={onToggle} style={{ fontFamily:"DM Sans",fontSize:14,fontWeight:500,color:"#1e1c1a",flex:1,textDecoration:sub.achieved?"line-through":"none",cursor:"pointer" }}>{sub.title}</p>
                  <div style={{ display:"flex",alignItems:"center",gap:8 }}>
                    {sub.achieved ? <AchievedBadge /> : <span style={{ fontSize:12,color:"#aaa",fontFamily:"DM Sans" }}>{done}/{activeActions.length}</span>}
                    {activeDays > 0 && !sub.achieved && <span style={{ fontSize:11,color:goalColor,fontFamily:"DM Sans",fontWeight:600 }}>🔥{activeDays}天</span>}
                    {!sub.achieved && onUpdateSubgoal && <button onClick={e => { e.stopPropagation(); setSubgoalTitleVal(sub.title); setSubgoalNoteVal(sub.note||""); setEditingSubgoalTitle(true); }} style={{ background:"none",border:"none",cursor:"pointer",color:"#ccc",fontSize:13,padding:0 }}>✏️</button>}
                    <button onClick={e => { e.stopPropagation(); onDeleteSubgoal(); }} style={{ background:"none",border:"none",cursor:"pointer",color:"#ddd",fontSize:14,padding:0 }}>✕</button>
                    <span onClick={onToggle} style={{ color:"#ccc",fontSize:13,cursor:"pointer" }}>{expanded?"▲":"▼"}</span>
                  </div>
                </div>
              </>
            )}
            {!sub.achieved && <ProgressBar value={activeActions.length ? (done/activeActions.length)*100 : 0} color={goalColor} />}
            {expanded && !sub.achieved && sub.note && !editingSubgoalNote && (
              <div style={{ borderTop:"1px solid #ede9e3",marginTop:8,paddingTop:8 }}>
                <p style={{ fontSize:12,color:"#888",fontFamily:"DM Sans",lineHeight:1.7,whiteSpace:"pre-wrap" }}>{sub.note}</p>
              </div>
            )}
            {expanded && onUpdateSubgoal && !sub.achieved && editingSubgoalNote && (
              <div style={{ borderTop:"1px solid #ede9e3",marginTop:8,paddingTop:8 }}>
                <textarea value={subgoalNoteVal} onChange={e => setSubgoalNoteVal(e.target.value)} autoFocus placeholder="說明..." style={{ width:"100%",border:"1.5px solid #1e1c1a",borderRadius:10,padding:"8px 10px",fontSize:12,fontFamily:"DM Sans",outline:"none",resize:"none",minHeight:56,background:"#fff",color:"#444",lineHeight:1.6,boxSizing:"border-box" }} />
                <div style={{ display:"flex",gap:6,marginTop:6 }}>
                  <button onClick={() => { setSubgoalNoteVal(sub.note||""); setEditingSubgoalNote(false); }} style={{ flex:1,padding:"6px",borderRadius:8,border:"1.5px solid #e8e4de",background:"#fff",color:"#888",fontSize:12,fontFamily:"DM Sans",cursor:"pointer" }}>取消</button>
                  <button onClick={saveSubgoalNote} style={{ flex:2,padding:"6px",borderRadius:8,border:"none",background:"#1e1c1a",color:"#fff",fontSize:12,fontFamily:"DM Sans",fontWeight:600,cursor:"pointer" }}>儲存</button>
                </div>
              </div>
            )}
          </div>
          {expanded && (
            <div style={{ marginLeft:12,marginTop:6 }}>
              <div style={{ display:"flex",justifyContent:"flex-end",marginBottom:8 }}>
                <AchieveButton achieved={sub.achieved} onToggle={onAchieveSubgoal} small />
              </div>
              {sub.actions.map(action => (
                <div key={action.id} style={{ marginBottom:6 }}>
                  {editingActionId === action.id ? (
                    <div style={{ background:"#fff",borderRadius:12,border:"1.5px solid #1e1c1a",padding:"12px 14px" }}>
                      <input value={editActionTitle} onChange={e => setEditActionTitle(e.target.value)} autoFocus onKeyDown={e => e.key==="Escape" && setEditingActionId(null)}
                        style={{ width:"100%",border:"none",borderBottom:"1px solid #e8e4de",fontSize:14,fontFamily:"DM Sans",outline:"none",background:"transparent",paddingBottom:8,marginBottom:12,boxSizing:"border-box" }} />
                      <FreqPicker freq={editActionFreq} onChange={setEditActionFreq} />
                      <div style={{ display:"flex",gap:6,marginTop:4 }}>
                        <button onClick={() => setEditingActionId(null)} style={{ flex:1,padding:"8px",borderRadius:8,border:"1.5px solid #e8e4de",background:"#fff",color:"#888",fontSize:12,fontFamily:"DM Sans",cursor:"pointer" }}>取消</button>
                        <button onClick={() => saveEditAction(action)} disabled={!editActionTitle.trim()} style={{ flex:2,padding:"8px",borderRadius:8,border:"none",background:editActionTitle.trim()?goalColor:"#e8e4de",color:"#fff",fontSize:12,fontFamily:"DM Sans",fontWeight:600,cursor:"pointer" }}>儲存</button>
                      </div>
                    </div>
                  ) : (
                    <div style={{ display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:"#fff",borderRadius:12,border:"1px solid #ede9e3",opacity:action.achieved?0.45:1 }}>
                      <div style={{ width:20,height:20,borderRadius:6,border:`2px solid ${action.achieved?"#ccc":goalColor}`,background:action.done&&!action.achieved?goalColor:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0 }}>
                        {(action.done||action.achieved) && <span style={{ color:action.achieved?"#ccc":"#fff",fontSize:11 }}>✓</span>}
                      </div>
                      <div style={{ flex:1,minWidth:0,cursor:"pointer" }} onClick={() => setLogAction({...action,goalColor,goalId,branchId,subgoalId:sub.id,goalTitle:sub.title})}>
                        <p style={{ fontFamily:"DM Sans",fontSize:13.5,color:"#1e1c1a",textDecoration:action.achieved?"line-through":"none" }}>{action.title}{action.type==="note"&&<span style={{ marginLeft:4,fontSize:11,color:"#bbb" }}>📝</span>}</p>
                        <p style={{ fontSize:11,color:"#ccc",fontFamily:"DM Sans",marginTop:1 }}>{freqLabel(action.freq)}{action.logs.filter(l=>l.type!=="check").length>0?` · ${action.logs.filter(l=>l.type!=="check").length} 筆紀錄`:""}</p>
                      </div>
                      <div style={{ display:"flex",gap:6,alignItems:"center" }}>
                        {!action.achieved && onUpdateSubgoal && <button onClick={(e) => startEditAction(action,e)} style={{ background:"none",border:"none",cursor:"pointer",color:"#ccc",fontSize:13,padding:0 }}>✏️</button>}
                        <AchieveButton achieved={action.achieved} onToggle={() => onAchieveAction(action.id)} small />
                        <button onClick={() => onDeleteAction(action.id)} style={{ background:"none",border:"none",cursor:"pointer",color:"#ddd",fontSize:14,padding:0 }}>✕</button>
                      </div>
                    </div>
                  )}
                </div>
              ))}
              <InlineAdd placeholder="新增行動項目..." onAdd={(title,type,freq) => onAddAction(title,type,freq)} color={goalColor} small showType />
              {onUpdateSubgoal && (() => {
                const rewardCount = (sub.rewards||[]).length;
                const unlockedCount = (sub.rewards||[]).filter(r=>r.unlockedAt).length;
                return <RewardSection rewards={sub.rewards||[]} rewardCount={rewardCount} unlockedCount={unlockedCount} onSave={(newRewards) => onUpdateSubgoal({...sub,rewards:newRewards})} />;
              })()}
            </div>
          )}
          {logAction && (
            <LogModal action={logAction} onClose={() => setLogAction(null)}
              onSaveLog={(action,log) => { onSaveLog(action,log); setLogAction(prev => prev ? {...prev,logs:[...(prev.logs||[]),log]} : prev); }}
              onUpdateLog={(action,logId,newText) => { onUpdateLog(action,logId,newText); setLogAction(prev => prev ? {...prev,logs:prev.logs.map(l=>l.id===logId?{...l,text:newText}:l)} : prev); }}
              onDeleteLog={(action,logId) => { onDeleteLog(action,logId); setLogAction(prev => prev ? {...prev,logs:prev.logs.filter(l=>l.id!==logId)} : prev); }}
              onToggleDone={(action) => { onToggleDone(action); setLogAction(prev => prev ? {...prev,done:!prev.done} : prev); }} />
          )}
        </div>
      );
    }

    function GoalDetailModal({ goal, onClose, onUpdate, onDelete, onSaveLog, onUpdateLog, onDeleteLog, onToggleAction, onTriggerReward }) {
      const [g, setG] = useState(JSON.parse(JSON.stringify(goal)));
      const [addingBranch, setAddingBranch] = useState(false);
      const [newBranchName, setNewBranchName] = useState("");
      const [newBranchNote, setNewBranchNote] = useState("");
      const [expandedBranch, setExpandedBranch] = useState(null);
      const [expandedSubgoal, setExpandedSubgoal] = useState(null);
      const [confirmDelete, setConfirmDelete] = useState(null);
      const [editingGoal, setEditingGoal] = useState(false);
      const [editGoalTitle, setEditGoalTitle] = useState(g.title);
      const [editGoalNote, setEditGoalNote] = useState(g.note||"");
      const [editGoalColor, setEditGoalColor] = useState(g.color);
      const [editGoalEmoji, setEditGoalEmoji] = useState(g.emoji);
      const [editingBranchId, setEditingBranchId] = useState(null);
      const [editBranchTitle, setEditBranchTitle] = useState("");
      const [editBranchNote, setEditBranchNote] = useState("");

      const saveGoalMeta = () => { if (!editGoalTitle.trim()) return; save({...g,title:editGoalTitle.trim(),note:editGoalNote.trim(),color:editGoalColor,emoji:editGoalEmoji}); setEditingGoal(false); };
      const saveEditBranch = (bId) => { if (!editBranchTitle.trim()) return; save({...g,branches:g.branches.map(b=>b.id===bId?{...b,title:editBranchTitle.trim(),note:editBranchNote.trim()}:b)}); setEditingBranchId(null); };
      const save = (updated) => { setG(updated); onUpdate(updated); };
      const addBranch = () => { if (!newBranchName.trim()) return; save({...g,branches:[...g.branches,{id:genId(),title:newBranchName.trim(),note:newBranchNote.trim(),achieved:false,subgoals:[]}]}); setNewBranchName(""); setNewBranchNote(""); setAddingBranch(false); };
      const addSubgoal = (bId,title,note) => save({...g,branches:g.branches.map(b=>b.id===bId?{...b,subgoals:[...b.subgoals,{id:genId(),title,note:note||"",achieved:false,actions:[]}]}:b)});
      const addAction = (bId,sId,title,type,freq) => save({...g,branches:g.branches.map(b=>b.id===bId?{...b,subgoals:b.subgoals.map(s=>s.id===sId?{...s,actions:[...s.actions,{id:genId(),title,type:type||"check",done:false,achieved:false,logs:[],freq:freq||{type:"daily",startDate:todayKey(),days:[]}}]}:s)}:b)});
      const deleteAction = (bId,sId,aId) => save({...g,branches:g.branches.map(b=>b.id===bId?{...b,subgoals:b.subgoals.map(s=>s.id===sId?{...s,actions:s.actions.filter(a=>a.id!==aId)}:s)}:b)});
      const deleteBranch = (bId) => save({...g,branches:g.branches.filter(b=>b.id!==bId)});
      const deleteSubgoal = (bId,sId) => save({...g,branches:g.branches.map(b=>b.id===bId?{...b,subgoals:b.subgoals.filter(s=>s.id!==sId)}:b)});
      const achieveAction = (bId,sId,aId) => save({...g,branches:g.branches.map(b=>b.id===bId?{...b,subgoals:b.subgoals.map(s=>s.id===sId?{...s,actions:s.actions.map(a=>a.id===aId?{...a,achieved:!a.achieved}:a)}:s)}:b)});
      const achieveSubgoal = (bId,sId) => {
        const sub = g.branches.find(b=>b.id===bId)?.subgoals.find(s=>s.id===sId);
        if (sub && !sub.achieved) {
          const completeReward = (sub.rewards||[]).find(r=>r.type==="complete"&&!r.unlockedAt);
          if (completeReward && onTriggerReward) {
            setTimeout(() => onTriggerReward(completeReward, sub.title), 200);
            save({...g,branches:g.branches.map(b=>b.id===bId?{...b,subgoals:b.subgoals.map(s=>s.id===sId?{...s,achieved:true,rewards:(s.rewards||[]).map(r=>r.id===completeReward.id?{...r,unlockedAt:todayKey()}:r)}:s)}:b)});
            return;
          }
        }
        save({...g,branches:g.branches.map(b=>b.id===bId?{...b,subgoals:b.subgoals.map(s=>s.id===sId?{...s,achieved:!s.achieved}:s)}:b)});
      };
      const achieveBranch = (bId) => save({...g,branches:g.branches.map(b=>b.id===bId?{...b,achieved:!b.achieved}:b)});
      const updateSubgoal = (bId,updatedSub) => save({...g,branches:g.branches.map(b=>b.id===bId?{...b,subgoals:b.subgoals.map(s=>s.id===updatedSub.id?updatedSub:s)}:b)});

      const allActions = g.branches.flatMap(b=>b.subgoals.flatMap(s=>s.actions));
      const activeActions = allActions.filter(a=>!a.achieved);
      const done = activeActions.filter(a=>a.done).length;
      const pct = activeActions.length ? Math.round((done/activeActions.length)*100) : 0;

      return (
        <div style={{ position:"fixed",inset:0,background:"#faf9f7",zIndex:50,overflowY:"auto" }}>
          <div style={{ position:"sticky",top:0,background:"#faf9f7",padding:"52px 20px 16px",borderBottom:"1px solid #ede9e3",zIndex:10 }}>
            <button onClick={onClose} style={{ background:"none",border:"none",cursor:"pointer",fontSize:13,color:"#888",fontFamily:"DM Sans",padding:0,marginBottom:10 }}>← 返回</button>
            {editingGoal ? (
              <div style={{ marginBottom:12 }}>
                <div style={{ display:"flex",alignItems:"center",gap:10,marginBottom:12,padding:"10px 14px",background:"#f5f3f0",borderRadius:14,borderLeft:`4px solid ${editGoalColor}` }}>
                  <span style={{ fontSize:26 }}>{editGoalEmoji}</span>
                  <p style={{ fontFamily:"DM Serif Display, serif",fontSize:16,color:editGoalTitle?"#1e1c1a":"#ccc" }}>{editGoalTitle||"目標名稱"}</p>
                </div>
                <input value={editGoalTitle} onChange={e => setEditGoalTitle(e.target.value)} autoFocus style={{ width:"100%",border:"none",borderBottom:"1.5px solid #1e1c1a",fontSize:16,fontFamily:"DM Sans",outline:"none",paddingBottom:6,marginBottom:12,boxSizing:"border-box",background:"transparent" }} />
                <textarea value={editGoalNote} onChange={e => setEditGoalNote(e.target.value)} placeholder="說明（選填）..." style={{ width:"100%",border:"none",borderBottom:"1px solid #e8e4de",fontSize:13,fontFamily:"DM Sans",outline:"none",paddingBottom:8,marginBottom:14,boxSizing:"border-box",resize:"none",minHeight:56,background:"transparent",color:"#666",lineHeight:1.6 }} />
                <GoalAppearancePicker color={editGoalColor} emoji={editGoalEmoji} onColorChange={setEditGoalColor} onEmojiChange={setEditGoalEmoji} />
                <div style={{ display:"flex",gap:8 }}>
                  <button onClick={() => setEditingGoal(false)} style={{ flex:1,padding:"10px",borderRadius:12,border:"1.5px solid #e8e4de",background:"#fff",color:"#888",fontSize:13,fontFamily:"DM Sans",cursor:"pointer" }}>取消</button>
                  <button onClick={saveGoalMeta} style={{ flex:2,padding:"10px",borderRadius:12,border:"none",background:"#1e1c1a",color:"#fff",fontSize:13,fontFamily:"DM Sans",fontWeight:600,cursor:"pointer" }}>儲存</button>
                </div>
              </div>
            ) : (
              <>
                <div style={{ display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:g.note?8:12 }}>
                  <div style={{ display:"flex",alignItems:"center",gap:12 }}>
                    <span style={{ fontSize:32 }}>{g.emoji}</span>
                    <div>
                      <h2 style={{ fontFamily:"DM Serif Display, serif",fontSize:24,color:"#1e1c1a",fontWeight:400,textDecoration:g.achieved?"line-through":"none" }}>{g.title}</h2>

                <p style={{ fontSize:32,marginBottom:12 }}>🗑️</p>

                <p style={{ fontFamily:"DM Sans",fontSize:13,color:"#aaa",marginBottom:24 }}>刪除後無法復原</p>
                <div style={{ display:"flex",gap:10 }}>

                  <button onClick={() => {confirmDelete.fn();setConfirmDelete(null);}} style={{ flex:1,padding:"13px",borderRadius:14,border:"none",background:"#e05555",color:"#fff",fontSize:15,fontFamily:"DM Sans",fontWeight:600,cursor:"pointer" }}>刪除</button>
                </div>
              </div>
            </div>

        </div>

    // ─── Stats & Records ─────────────────────────────────────────────────────
    function HeatmapCalendar({ goals }) {
      const today = new Date();
      const [viewYear, setViewYear] = useState(today.getFullYear());
      const [viewMonth, setViewMonth] = useState(today.getMonth());
      const [filterGoalId, setFilterGoalId] = useState("all");
      const [expandedDay, setExpandedDay] = useState(null);
      const monthNames = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
      const dowNames = ["日","一","二","三","四","五","六"];
      const allActions = getAllActionsFlat(goals);
      const filteredActions = filterGoalId==="all" ? allActions : allActions.filter(a=>a.goalId===filterGoalId);
      const dayMap = {};
      filteredActions.forEach(action => {
        (action.logs||[]).forEach(log => {
          if (!dayMap[log.date]) dayMap[log.date]={count:0,entries:[]};
          dayMap[log.date].count++;
          dayMap[log.date].entries.push({actionTitle:action.title,goalColor:action.goalColor,goalEmoji:action.goalEmoji,type:log.type||"note",text:log.text,id:log.id});
        });
      });
      const maxCount = Math.max(1,...Object.values(dayMap).map(d=>d.count));
      const selectedGoal = filterGoalId!=="all" ? goals.find(g=>g.id===filterGoalId) : null;
      const baseColor = selectedGoal ? selectedGoal.color : null;
      const hexToRgb = (hex) => [parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];
      const blendWithWhite = (hex,intensity) => { const [r,g,b]=hexToRgb(hex); const blend=(c)=>Math.round(c+(255-c)*(1-intensity)); return `rgb(${blend(r)},${blend(g)},${blend(b)})`; };
      const getColor = (count) => {
        if (!count) return "#f0ede8";
        const intensity = count/maxCount;
        if (baseColor) { const minI=0.25; return blendWithWhite(baseColor,minI+intensity*(1-minI)); }
        if (intensity<0.25) return "#c8dfd0"; if (intensity<0.5) return "#8abe9e"; if (intensity<0.75) return "#5a9e78"; return "#2d7a50";
      };
      const legendColors = baseColor ? [0.15,0.35,0.55,0.75,0.95].map(i=>blendWithWhite(baseColor,i)) : ["#f0ede8","#c8dfd0","#8abe9e","#5a9e78","#2d7a50"];
      const firstDay = new Date(viewYear,viewMonth,1).getDay();
      const daysInMonth = new Date(viewYear,viewMonth+1,0).getDate();
      const cells = [];
      for (let i=0;i<firstDay;i++) cells.push(null);
      for (let d=1;d<=daysInMonth;d++) cells.push(d);
      const prevMonth = () => viewMonth===0?(setViewMonth(11),setViewYear(y=>y-1)):setViewMonth(m=>m-1);
      const nextMonth = () => viewMonth===11?(setViewMonth(0),setViewYear(y=>y+1)):setViewMonth(m=>m+1);
      const expanded = expandedDay ? dayMap[expandedDay] : null;
      return (
        <div style={{ marginBottom:28 }}>
          <p style={{ fontSize:13,fontFamily:"DM Sans",fontWeight:600,color:"#1e1c1a",marginBottom:12 }}>月曆熱力圖</p>
          <div style={{ display:"flex",flexWrap:"wrap",gap:6,marginBottom:14 }}>
            <button onClick={() => setFilterGoalId("all")} style={{ padding:"5px 12px",borderRadius:99,border:"1.5px solid",borderColor:filterGoalId==="all"?"#1e1c1a":"#e8e4de",background:filterGoalId==="all"?"#1e1c1a":"#fff",color:filterGoalId==="all"?"#fff":"#888",fontSize:12,fontFamily:"DM Sans",cursor:"pointer" }}>全部</button>
            {goals.map(g=><button key={g.id} onClick={() => setFilterGoalId(g.id)} style={{ padding:"5px 12px",borderRadius:99,border:"1.5px solid",borderColor:filterGoalId===g.id?g.color:"#e8e4de",background:filterGoalId===g.id?g.color:"#fff",color:filterGoalId===g.id?"#fff":"#888",fontSize:12,fontFamily:"DM Sans",cursor:"pointer" }}>{g.emoji} {g.title}</button>)}
          </div>
          <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10 }}>
            <button onClick={prevMonth} style={{ background:"none",border:"1.5px solid #e8e4de",borderRadius:8,padding:"4px 12px",cursor:"pointer",color:"#888",fontSize:16 }}>‹</button>
            <span style={{ fontFamily:"DM Sans",fontWeight:600,color:"#1e1c1a",fontSize:14 }}>{viewYear}年 {monthNames[viewMonth]}</span>
            <button onClick={nextMonth} style={{ background:"none",border:"1.5px solid #e8e4de",borderRadius:8,padding:"4px 12px",cursor:"pointer",color:"#888",fontSize:16 }}>›</button>
          </div>
          <div style={{ display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:3 }}>
            {dowNames.map(d=><div key={d} style={{ textAlign:"center",fontSize:10,color:"#bbb",fontFamily:"DM Sans",fontWeight:600,padding:"3px 0" }}>{d}</div>)}
          </div>
          <div style={{ display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:12 }}>
            {cells.map((day,i) => {
              if (!day) return <div key={"e"+i} />;
              const dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
              const data = dayMap[dateStr]; const count = data?.count||0;
              const isToday = dateStr===todayKey(); const isExpanded = expandedDay===dateStr;
              return <div key={dateStr} onClick={() => setExpandedDay(isExpanded?null:dateStr)} style={{ aspectRatio:"1",borderRadius:7,background:getColor(count),display:"flex",alignItems:"center",justifyContent:"center",cursor:count>0?"pointer":"default",border:isToday?"2px solid #1e1c1a":isExpanded?"2px solid #555":"2px solid transparent",position:"relative" }}>
                <span style={{ fontSize:10,fontFamily:"DM Sans",fontWeight:isToday?700:400,color:count>0?"#fff":"#c8c4be" }}>{day}</span>
                {count>0 && <span style={{ position:"absolute",bottom:2,right:3,fontSize:9,fontFamily:"DM Sans",fontWeight:700,color:"rgba(255,255,255,0.85)" }}>{count}</span>}
              </div>;
            })}
          </div>
          <div style={{ display:"flex",alignItems:"center",gap:4,marginBottom:8 }}>
            <span style={{ fontSize:10,color:"#aaa",fontFamily:"DM Sans" }}>少</span>
            {legendColors.map((c,i)=><div key={i} style={{ width:14,height:14,borderRadius:3,background:c }} />)}

    function getWeekRange(offsetWeeks=0) {
      const today=new Date(); const dow=today.getDay();
      const monday=new Date(today); monday.setDate(today.getDate()-(dow===0?6:dow-1)+offsetWeeks*7); monday.setHours(0,0,0,0);
      const sunday=new Date(monday); sunday.setDate(monday.getDate()+6);
      return {start:monday,end:sunday};
    }
    function getMonthRange(offsetMonths=0) {
      const today=new Date();
      const start=new Date(today.getFullYear(),today.getMonth()+offsetMonths,1);
      const end=new Date(today.getFullYear(),today.getMonth()+offsetMonths+1,0);
      return {start,end};
    }
    function dateInRange(dateStr,start,end) { const d=new Date(dateStr+"T00:00:00"); return d>=start&&d<=end; }
    function countExpected(action,start,end) {
      if (action.type!=="check"||action.achieved) return 0;
      const freq=action.freq; if (!freq) return 0;
      let count=0; const cur=new Date(start);
      while (cur<=end) {
        const dow=cur.getDay(); const dom=cur.getDate(); const dateStr=cur.toISOString().slice(0,10);
        if (freq.type==="daily") count++;
        else if (freq.type==="alternate") { if (freq.startDate){const s=new Date(freq.startDate+"T00:00:00");const diff=Math.round((cur-s)/86400000);if(diff>=0&&diff%2===0)count++;} }
        else if (freq.type==="weekly_specific") { if((freq.days||[]).includes(dow))count++; }
        else if (freq.type==="weekly_once") { if(dow===1)count++; }
        else if (freq.type==="monthly_once") { if(dom===1)count++; }
        else if (freq.type==="specific_dates") { if((freq.dates||[]).includes(dateStr))count++; }
        cur.setDate(cur.getDate()+1);
      }
      return count;
    }
    function countActual(action,start,end) { if (action.type!=="check") return 0; return (action.logs||[]).filter(l=>l.type==="check"&&dateInRange(l.date,start,end)).length; }
    function calcGoalStats(goal,start,end) {
      const actionStats=[];
      goal.branches.forEach(b=>{ if(b.achieved)return; b.subgoals.forEach(s=>{ if(s.achieved)return; s.actions.forEach(a=>{ if(a.type!=="check"||a.achieved)return; const expected=countExpected(a,start,end); const actual=countActual(a,start,end); if(expected>0)actionStats.push({action:a,expected,actual,rate:Math.round((actual/expected)*100)}); }); }); });
      const totalExpected=actionStats.reduce((s,x)=>s+x.expected,0); const totalActual=actionStats.reduce((s,x)=>s+x.actual,0);
      return {rate:totalExpected>0?Math.round((totalActual/totalExpected)*100):null,totalExpected,totalActual,actionStats};
    }
